<!-- ══ SCRIPTS: THEME Y MODAL ══ -->
<script>
  // Theme toggle
  const html        = document.documentElement;
  const toggleBtn   = document.getElementById('themeToggle');
  const themeIcon   = document.getElementById('themeIcon');
  const STORAGE_KEY = 'yl-portfolio-theme';

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    themeIcon.className = theme === 'dark'
      ? 'fas fa-moon theme-icon'
      : 'fas fa-sun theme-icon';
    localStorage.setItem(STORAGE_KEY, theme);
  }

  // Load saved preference; default = light
  const saved = localStorage.getItem(STORAGE_KEY) || 'light';
  applyTheme(saved);

  toggleBtn.addEventListener('click', () => {
    const current = html.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });

  // Modal screenshots fullscreen
  document.addEventListener('DOMContentLoaded', function() {
    const modal = document.getElementById('screenshotModal');
    const modalImg = document.getElementById('modalImg');
    const closeModal = document.getElementById('closeModal');
    let lastScroll = 0;
    document.querySelectorAll('.screenshot-img').forEach(img => {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', function(e) {
        e.preventDefault();
        lastScroll = window.scrollY;
        modal.style.display = 'flex';
        modalImg.src = this.src;
        modalImg.alt = this.alt;
        document.body.style.overflow = 'hidden';
      });
    });
    function closeModalFn() {
      modal.style.display = 'none';
      modalImg.src = '';
      document.body.style.overflow = '';
      window.scrollTo(0, lastScroll);
    }
    closeModal.addEventListener('click', closeModalFn);
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModalFn();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modal.style.display === 'flex') closeModalFn();
    });
  });
</script>
